<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Every Body Witness</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👁️</text></svg>" />
  <style>
    :root {
      --bg: #0e0e10;
      --panel: #18181b;
      --border: #2a2a30;
      --text: #ececef;
      --muted: #9a9aa3;
      --accent: #e4b343;
      --accent-text: #0e0e10;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2.75rem;
      letter-spacing: -0.02em;
      margin: 0 0 0.4rem;
      font-weight: 600;
    }

    .intake-title { padding-bottom: 1.5rem; }

    .sub {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      margin: 0 0 2rem;
      line-height: 1.5;
    }

    fieldset {
      border: none;
      margin: 0;
      padding: 0;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.85rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.6rem;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.35;
    }

    .option:hover { border-color: #3d3d46; background: #1d1d22; }

    .option input {
      appearance: none;
      -webkit-appearance: none;
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      margin: 1px 0 0;
      border: 1.5px solid #4a4a55;
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .option input:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .option input:checked::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid var(--accent-text);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .option input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.95rem;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }

    #submitBtn { margin-top: 0; }

    .thanks {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .thanks h1 { margin-bottom: 0.5rem; }

    .thanks p {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      margin: 0;
    }

    .field {
      text-align: left;
      margin-top: 1.25rem;
    }

    .field label {
      display: block;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .field input[type="text"],
    .field input[type="email"] {
      width: 100%;
      padding: 0.8rem 0.9rem;
      background: #0e0e10;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .field textarea {
      width: 100%;
      padding: 0.8rem 0.9rem;
      background: #0e0e10;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      resize: vertical;
      min-height: 120px;
    }

    #statement { margin-top: -1.5rem; }
    #statement .field { margin-top: 0; }
    #statementText { min-height: 96px; }
    #skipBtn { margin-top: 2.25rem; }

    .mic-btn {
      width: auto;
      margin: 0.6rem 0 0;
      padding: 0.5rem 0.9rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .mic-btn:hover { border-color: var(--accent); opacity: 1; }
    .mic-btn:disabled { opacity: 0.6; }

    .link-btn {
      width: auto;
      display: block;
      margin: 0.75rem auto 0;
      padding: 0.4rem 0.6rem;
      background: none;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 400;
      text-decoration: underline;
    }

    .link-btn:hover { opacity: 1; color: var(--text); }

    #recordBtn { touch-action: none; user-select: none; -webkit-user-select: none; }
    #recordBtn.recording { background: #d9534f; color: #fff; }

    .rec-dots span {
      animation: recDot 1.2s infinite;
      opacity: 0.25;
    }
    .rec-dots span:nth-child(2) { animation-delay: 0.2s; }
    .rec-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes recDot {
      0%, 70%, 100% { opacity: 0.25; }
      35% { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rec-dots span { animation: none; opacity: 1; }
    }

    .btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .btn-row #recordBtn {
      width: auto;
      height: 3.25rem;
      margin: 0;
      padding: 0 1.5rem;
      flex: 1 1 auto;
    }

    .btn-row #recordBtn.recording {
      flex: 0 0 auto;
      min-width: 0;
    }

    .rec-controls {
      display: flex;
      gap: 0.6rem;
    }

    .circle-btn {
      flex: 0 0 auto;
      width: 3.25rem;
      height: 3.25rem;
      margin: 0;
      padding: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .circle-btn svg { width: 1.3rem; height: 1.3rem; display: block; }

    .circle-btn.play { background: #d9534f; color: #fff; }
    .circle-btn.delete { background: #fff; color: #000; }

    .error {
      color: #f08a8a;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.85rem;
      margin: 0.75rem 0 0;
      min-height: 1.1em;
    }

    .error.below-card {
      text-align: center;
      margin: 0;
      min-height: 0;
      padding-top: 16px;
    }
    .error.below-card:empty { padding-top: 0; }

    .help {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      line-height: 1.45;
      margin: 1rem 0;
      text-align: center;
    }

    .testify-intro {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.92rem;
      margin: 1.75rem 0 0;
      line-height: 1.5;
      text-align: left;
    }

    .hidden { display: none !important; }

    /* ---- Living moth cursor (engine: moth-cursor.js) -------------------- */
    /* Swap the pointer for the moth only on fine, motion-allowed pointers;
       the engine itself bails on touch / reduced-motion, leaving this inert. */
    @media (pointer: fine) and (prefers-reduced-motion: no-preference) {
      html.moth-cursor-active,
      html.moth-cursor-active * { cursor: none; }
      /* Keep an I-beam over text fields so people can see where they type. */
      html.moth-cursor-active input,
      html.moth-cursor-active textarea { cursor: text; }
    }

    #moth-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 675px;
      height: 565px;
      transform-origin: 327px 250px;
      pointer-events: none;
      z-index: 2147483647;
      opacity: 0;
      transition: opacity 0.7s ease;
      contain: layout style size;
    }
    #moth-cursor.is-ready { opacity: 1; }
    #moth-cursor.is-out { opacity: 0; }
    #moth-cursor img {
      position: absolute;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <form id="intake">
        <h1 class="intake-title">This <em>is </em>community.</h1>
        <fieldset>
          <label class="option"><input type="checkbox" name="opt" value="know-garrett" /> I know Garrett James McManus</label>
          <label class="option"><input type="checkbox" name="opt" value="know-niket" /> I know Niket Naushik Desai</label>
          <label class="option"><input type="checkbox" name="opt" value="know-kathleen" /> I know Kathleen H. Warner</label>
          <label class="option"><input type="checkbox" name="opt" value="saw-tape" /> I witnessed your sex tape</label>
          <label class="option"><input type="checkbox" name="opt" value="saw-data" /> I witnessed other private data</label>
          <label class="option"><input type="checkbox" name="opt" value="saw-abuse" /> I witnessed the public abuse</label>
          <label class="option"><input type="checkbox" name="opt" value="saw-damages" /> I witnessed how it affected you</label>
          <label class="option"><input type="checkbox" name="opt" value="know-how-it-works" /> I know how it works - technically.</label>
          <label class="option"><input type="checkbox" name="opt" value="willing-to-testify" /> I'm willing to testify in court (privately) about the specific aforementioned subjects</label>
          <label class="option"><input type="checkbox" name="opt" value="me-too" /> I, or someone I know - was targeted, too</label>
        </fieldset>
        <p class="help"><em>Thank you for doing the right thing.</em></p>
        <p id="formError" class="error"></p>
        <button id="submitBtn" type="submit">Submit</button>
      </form>

      <div id="done" class="thanks hidden">
        <h1 id="doneHeading" class="hidden">Thank you.</h1>

        <form id="statement" class="hidden">
          <div class="field">
            <textarea id="statementText" name="statement" rows="5" placeholder="Write what you know…"></textarea>
          </div>
          <div class="btn-row">
            <div id="recControls" class="rec-controls hidden">
              <button id="playBtn" type="button" class="circle-btn play" aria-label="Play recording">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
              </button>
              <button id="deleteBtn" type="button" class="circle-btn delete" aria-label="Delete recording">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
              </button>
            </div>
            <button id="recordBtn" type="button" data-mode="record">Press to record</button>
          </div>
          <button id="skipBtn" type="button" class="link-btn">Skip</button>
        </form>

        <form id="contact" class="hidden">
          <div class="field">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" name="fullName" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>
          <p id="contactError" class="error"></p>
          <button id="contactBtn" type="submit">Send</button>
        </form>

        <p id="contactDone" class="hidden" style="color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 0.95rem; margin-top: 1.5rem;">How we use our tools matters.</p>
      </div>
    </div>
    <p id="statementError" class="error below-card"></p>
  </main>

  <script>
    (function () {
      var STATE_KEY = "witness-intake-state";

      var form = document.getElementById("intake");
      var done = document.getElementById("done");
      var doneHeading = document.getElementById("doneHeading");
      var formError = document.getElementById("formError");
      var submitBtn = document.getElementById("submitBtn");

      var statement = document.getElementById("statement");
      var statementText = document.getElementById("statementText");
      var statementError = document.getElementById("statementError");
      var recordBtn = document.getElementById("recordBtn");
      var recControls = document.getElementById("recControls");
      var playBtn = document.getElementById("playBtn");
      var deleteBtn = document.getElementById("deleteBtn");
      var skipBtn = document.getElementById("skipBtn");

      var contact = document.getElementById("contact");
      var contactError = document.getElementById("contactError");
      var contactBtn = document.getElementById("contactBtn");
      var contactDone = document.getElementById("contactDone");
      var fullNameEl = document.getElementById("fullName");
      var emailEl = document.getElementById("email");

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(STATE_KEY)) || null;
        } catch (e) {
          return null;
        }
      }

      function saveState(state) {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      }

      function render(state) {
        form.classList.add("hidden");
        done.classList.remove("hidden");

        if (state.contactDone) {
          doneHeading.classList.remove("hidden");
          statement.classList.add("hidden");
          contact.classList.add("hidden");
          contactDone.classList.remove("hidden");
        } else if (!state.statementDone) {
          statement.classList.remove("hidden");
          contact.classList.add("hidden");
        } else {
          doneHeading.classList.remove("hidden");
          statement.classList.add("hidden");
          contact.classList.remove("hidden");
        }
      }

      var existing = loadState();
      if (existing && existing.submitted) {
        render(existing);
        return;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        formError.textContent = "";

        var selections = [].slice
          .call(form.querySelectorAll('input[name="opt"]:checked'))
          .map(function (el) { return el.value; });

        if (selections.length < 2) {
          formError.textContent = "Please select at least two options.";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting…";

        fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ selections: selections }),
        })
          .then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          })
          .then(function (res) {
            if (!res.ok) {
              throw new Error((res.data && res.data.error) || "Submission failed");
            }
            var state = {
              submitted: true,
              id: res.data.id,
              willingToTestify: !!res.data.willingToTestify,
              statementDone: false,
              contactDone: false,
            };
            saveState(state);
            render(state);
          })
          .catch(function (err) {
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit";
            formError.textContent = err.message || "Something went wrong. Please try again.";
          });
      });

      function advanceToContact(state) {
        state.statementDone = true;
        saveState(state);
        doneHeading.classList.remove("hidden");
        statement.classList.add("hidden");
        contact.classList.remove("hidden");
      }

      function saveTranscript(id, text) {
        return fetch("/api/transcription", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: id, text: text }),
        }).then(function (r) {
          return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        });
      }

      function autoSaveTranscript() {
        var st = loadState();
        if (!st || !st.id) return;
        saveTranscript(st.id, statementText.value.trim()).catch(function () {});
      }

      var mediaRecorder = null;
      var audioChunks = [];
      var audioURL = null;
      var audioEl = null;
      var holding = false;

      function startRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") return;
        if (!navigator.mediaDevices || !window.MediaRecorder) {
          statementError.textContent = "Recording isn't supported in this browser.";
          return;
        }
        statementError.textContent = "";
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function (stream) {
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.addEventListener("dataavailable", function (e) {
              if (e.data && e.data.size > 0) audioChunks.push(e.data);
            });
            mediaRecorder.addEventListener("stop", function () {
              stream.getTracks().forEach(function (t) { t.stop(); });
              recordBtn.classList.remove("recording");
              var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
              if (audioURL) URL.revokeObjectURL(audioURL);
              audioURL = URL.createObjectURL(blob);
              sendAudio(blob);
            });
            mediaRecorder.start();
            recordBtn.innerHTML =
              'Recording<span class="rec-dots"><span>.</span><span>.</span><span>.</span></span>';
            recordBtn.classList.add("recording");
            if (!holding) stopRecording();
          })
          .catch(function () {
            statementError.textContent = "Microphone access was denied.";
          });
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }

      recordBtn.addEventListener("pointerdown", function (e) {
        if (recordBtn.dataset.mode === "submit") return;
        e.preventDefault();
        holding = true;
        recControls.classList.add("hidden");
        startRecording();
      });
      function release(e) {
        if (recordBtn.dataset.mode === "submit") return;
        if (e) e.preventDefault();
        holding = false;
        stopRecording();
      }
      recordBtn.addEventListener("pointerup", release);
      recordBtn.addEventListener("pointerleave", release);
      recordBtn.addEventListener("pointercancel", release);

      statementText.addEventListener("input", function () {
        var hasText = !!statementText.value.trim();
        recordBtn.textContent = hasText ? "Submit" : "Press to record";
        recordBtn.dataset.mode = hasText ? "submit" : "record";
      });

      recordBtn.addEventListener("click", function () {
        if (recordBtn.dataset.mode !== "submit") return;
        var state = loadState();
        if (!state || !state.id) {
          statementError.textContent = "Your session expired. Please reload.";
          return;
        }
        recordBtn.disabled = true;
        recordBtn.textContent = "Submitting…";
        saveTranscript(state.id, statementText.value.trim())
          .then(function (res) {
            if (!res.ok) {
              throw new Error((res.data && res.data.error) || "Could not save your message");
            }
            advanceToContact(state);
          })
          .catch(function (err) {
            recordBtn.disabled = false;
            recordBtn.textContent = "Submit";
            statementError.textContent = err.message || "Something went wrong. Please try again.";
          });
      });

      function sendAudio(blob) {
        recordBtn.classList.add("hidden");
        statementText.placeholder = "Transcribing…";
        fetch("/api/transcribe", {
          method: "POST",
          headers: { "Content-Type": blob.type || "audio/webm" },
          body: blob,
        })
          .then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          })
          .then(function (res) {
            statementText.placeholder = "Write what you know…";
            if (!res.ok) {
              throw new Error((res.data && res.data.error) || "Could not transcribe audio");
            }
            var t = (res.data && res.data.text) || "";
            if (t) {
              statementText.value = statementText.value
                ? statementText.value.trim() + " " + t
                : t;
              autoSaveTranscript();
            }
            recControls.classList.remove("hidden");
            recordBtn.textContent = "Submit";
            recordBtn.dataset.mode = "submit";
            recordBtn.classList.remove("hidden");
          })
          .catch(function (err) {
            statementText.placeholder = "Write what you know…";
            statementError.textContent = err.message || "Could not transcribe audio.";
            recordBtn.textContent = "Press to record";
            recordBtn.dataset.mode = "record";
            recordBtn.classList.remove("hidden");
          });
      }

      playBtn.addEventListener("click", function () {
        if (!audioURL) return;
        if (!audioEl) audioEl = new Audio();
        audioEl.src = audioURL;
        audioEl.play();
      });

      deleteBtn.addEventListener("click", function () {
        if (audioEl) audioEl.pause();
        if (audioURL) { URL.revokeObjectURL(audioURL); audioURL = null; }
        audioChunks = [];
        statementText.value = "";
        recControls.classList.add("hidden");
        recordBtn.textContent = "Press to record";
        recordBtn.dataset.mode = "record";
        statementError.textContent = "";
        autoSaveTranscript();
      });

      skipBtn.addEventListener("click", function () {
        var state = loadState();
        if (!state || !state.id) {
          statementError.textContent = "Your session expired. Please reload.";
          return;
        }
        saveTranscript(state.id, statementText.value.trim())
          .then(function (res) {
            if (!res.ok) {
              throw new Error((res.data && res.data.error) || "Could not save your message");
            }
            advanceToContact(state);
          })
          .catch(function (err) {
            statementError.textContent = err.message || "Something went wrong. Please try again.";
          });
      });

      contact.addEventListener("submit", function (e) {
        e.preventDefault();
        contactError.textContent = "";

        var state = loadState();
        if (!state || !state.id) {
          contactError.textContent = "Your session expired. Please reload.";
          return;
        }

        var fullName = fullNameEl.value.trim();
        var email = emailEl.value.trim();
        if (!fullName) {
          contactError.textContent = "Please enter your full name.";
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          contactError.textContent = "Please enter a valid email.";
          return;
        }

        contactBtn.disabled = true;
        contactBtn.textContent = "Sending…";

        fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: state.id, fullName: fullName, email: email }),
        })
          .then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          })
          .then(function (res) {
            if (!res.ok) {
              throw new Error((res.data && res.data.error) || "Could not save details");
            }
            state.contactDone = true;
            saveState(state);
            contact.classList.add("hidden");
            doneHeading.classList.remove("hidden");
            contactDone.classList.remove("hidden");
          })
          .catch(function (err) {
            contactBtn.disabled = false;
            contactBtn.textContent = "Send";
            contactError.textContent = err.message || "Something went wrong. Please try again.";
          });
      });
    })();
  </script>

  <!-- A living Death's-head moth that replaces the pointer. -->
  <script src="/moth-cursor.js" defer></script>
</body>
</html>
